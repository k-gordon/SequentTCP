# Board Definition: Sequent MegaIO Industrial HAT
# https://sequentmicrosystems.com/products/mega-io-industrial-stackable-card-for-raspberry-pi
#
# Protocol: Sequent custom MCU with 1-byte register address prefix.
# I²C address = base + stack_id.
#
# Register map ported from:
#   https://github.com/SequentMicrosystems/megaioind-rpi
#
# This board comes in two variants distinguished by BOARD_TYPE (reg 0x7F):
#   IND (type=1): 4 × 0-10V outputs
#   BAS (type=2): 8 × 0-10V outputs (Building Automation version)
# This definition uses the IND variant channel counts.
#
# I/O capabilities:
#   - 4 relays (reg 0x00/0x01/0x02)
#   - 4 open-collector outputs (reg 0x03/0x04/0x05)
#   - 4 opto-isolated inputs (reg 0x06)
#   - 4 × 4-20mA outputs (reg 0x07, 2B LE)
#   - 4 × 4-20mA inputs (reg 0x0F, 2B LE)
#   - 4 × 0-10V outputs (reg 0x17, 2B LE) — 8 for BAS variant
#   - 4 × 0-10V inputs (reg 0x27, 2B LE)
#   - 4 × 10K thermistor inputs (reg 0x2F, 2B LE)
#
# Additional features NOT mapped by the current RegisterMap schema:
#   - Open-collector outputs (4ch at reg 0x03-0x05)
#   - 10K thermistor readings (4ch at reg 0x2F, 2B LE, Ω)
#   - RTC (real-time clock at reg 0x41+)
#   - RS-485 / Modbus passthrough (reg 0x3C+)
#   - Watchdog timer
#
# NOTE: Same base address (0x38) as 8-relay, 4-relay, 8-mosfet.
#       Address conflict — cannot stack together.
#
# ⚠️  EXPERIMENTAL — not validated on real hardware.

[board]
name = "Sequent MegaIO Industrial HAT"
protocol = "sequent_mcu"

[address]
base = 0x38
mode = "direct"         # base + stack_id

[channels]
relays = 4
opto_inputs = 4
analog_4_20ma_inputs = 4
analog_0_10v_inputs = 4
od_outputs = 4          # Open-collector outputs

[registers]
relay_val = 0x00        # Relay state bitmask (4 ch, read)
relay_set = 0x01        # Write channel to SET
relay_clr = 0x02        # Write channel to CLEAR
# oc_val = 0x03         # Open-collector output state (4 ch)
# oc_set = 0x04         # OC set
# oc_clr = 0x05         # OC clear
opto_in = 0x06          # Opto input bitmask (4 ch, read)
i4_20_out = 0x07        # 4-20mA output base (4ch × 2B LE)
i4_20_in = 0x0F         # 4-20mA input base (4ch × 2B LE)
u0_10_out = 0x17        # 0-10V output base (4ch × 2B LE, mV)
u0_10_in = 0x27         # 0-10V input base (4ch × 2B LE, mV)
# r_10k = 0x2F          # 10K thermistor (4ch × 2B LE, Ω)
# calib_channel = 0x37  # Calibration channel select
calib_value = 0x38      # Calibration value (2B LE)
# calib_cmd = 0x3A      # Calibration command
diag_temperature = 0x72 # CPU temperature (1B, °C)
diag_24v = 0x73         # 24V rail voltage (2B LE, mV)
diag_5v = 0x75          # 5V rail voltage (2B LE, mV)
revision_major = 0x78   # Hardware revision major
revision_minor = 0x79   # Hardware revision minor
# Note: Firmware version at 0x7A/0x7B
voltage_scale = 1000.0

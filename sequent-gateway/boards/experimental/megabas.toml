# Board Definition: Sequent Building Automation HAT (MegaBAS)
# https://sequentmicrosystems.com/products/building-automation-8-layer-stackable-hat-for-raspberry-pi
#
# Protocol: Sequent custom MCU with 1-byte register address prefix.
# I²C address = base + stack_id.
#
# Register map ported from:
#   https://github.com/SequentMicrosystems/megabas-rpi/blob/master/src/megabas.h
#
# I/O capabilities:
#   - 4 triacs (mapped as relays — reg 0x00/0x01/0x02)
#   - 8 dry-contact inputs (mapped as opto inputs — reg 0x03)
#   - 4 × 0-10V analog outputs (DAC, reg 0x04, 2B LE, mV)
#   - 8 × 0-10V analog inputs (ADC, reg 0x0C, 2B LE, mV)
#   - Diagnostics (CPU temp, 24V rail, 5V rail)
#
# Additional features NOT mapped by the current RegisterMap schema:
#   - 8 × 1K thermistor inputs (reg 0x1C, 2B LE, resistance Ω)
#   - 8 × 10K thermistor inputs (reg 0x2C, 2B LE, resistance Ω)
#   - 1-Wire bus (OWB) temperature sensors
#   - RTC (real-time clock)
#   - Watchdog timer
#   - RS-485 / Modbus passthrough
#   - LED blink control for triacs
#
# NOTE: Base address 0x48 — same as MegaInd at stack 0.
#       MegaInd uses base 0x50 so they can coexist if stacks don't overlap.
#
# ⚠️  EXPERIMENTAL — not validated on real hardware.

[board]
name = "Sequent Building Automation HAT (MegaBAS)"
protocol = "sequent_mcu"

[address]
base = 0x48
mode = "direct"         # base + stack_id

[channels]
relays = 4              # Triacs, not mechanical relays
opto_inputs = 8         # Dry-contact inputs
analog_0_10v_inputs = 8
od_outputs = 0

[registers]
relay_val = 0x00        # Triac output bitmask (read) — bits 0..3
relay_set = 0x01        # Write channel number to SET (turn ON)
relay_clr = 0x02        # Write channel number to CLEAR (turn OFF)
opto_in = 0x03          # Dry-contact input bitmask (read)
u0_10_out = 0x04        # 0-10V DAC output base (4ch × 2B LE, mV)
u0_10_in = 0x0C         # 0-10V ADC input base (8ch × 2B LE, mV)
# --- Unmapped registers (for future use) ---
# 1k_thermistor = 0x1C  # 8ch × 2B LE, resistance in Ω
# 10k_thermistor = 0x2C # 8ch × 2B LE, resistance in Ω
calib_value = 0x3C      # Calibration register
diag_temperature = 0x72 # CPU temperature (1B, °C)
diag_24v = 0x73         # 24V rail voltage (2B LE, mV)
diag_5v = 0x75          # 5V rail voltage (2B LE, mV)
revision_major = 0x78   # Hardware revision major
revision_minor = 0x79   # Hardware revision minor
# Note: Firmware version is at 0x7A/0x7B on this board
voltage_scale = 1000.0  # mV → V

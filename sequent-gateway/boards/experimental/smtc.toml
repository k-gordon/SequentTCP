# Board Definition: Sequent Thermocouple HAT (SMTC)
# https://sequentmicrosystems.com/products/eight-thermocouples-daq-8-layer-stackable-hat-for-raspberry-pi
#
# Protocol: Sequent custom MCU with 1-byte register address prefix.
# I²C address = base + stack_id.
#
# Register map ported from:
#   https://github.com/SequentMicrosystems/smtc-rpi
#
# I/O capabilities:
#   - 8 thermocouple inputs (int16 ÷ 10 = °C)
#   - Supports Type B, E, J, K, N, R, S, T
#   - Raw millivolt readings available
#
# This board only has thermocouple sensor inputs — no relays, analog out,
# or digital I/O.  The current RegisterMap schema does not have fields
# for thermocouple registers.
#
# ⚠️  EXPERIMENTAL — not validated on real hardware.

[board]
name = "Sequent 8-Thermocouple HAT"
protocol = "sequent_mcu"

[address]
base = 0x16
mode = "direct"         # base + stack_id

[channels]
# No standard relay/opto/analog channels — thermocouple only
# 8 thermocouple sensors are NOT yet representable in the channel config

[registers]
# --- Thermocouple registers (NOT mapped by current schema) ---
# tc_temp1-8 = 0x00     # 8ch × 2B int16, value ÷ 10 = °C
# tc_type1-8 = 0x10     # 8ch × 1B, thermocouple type select
diag_temperature = 0x18 # Board temperature (1B, °C)
diag_5v = 0x19          # 5V rail voltage (2B LE, mV)
revision_major = 0x2F   # Hardware revision major
revision_minor = 0x30   # Hardware revision minor
voltage_scale = 1000.0

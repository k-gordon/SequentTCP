# Board Definition: Sequent 8-Input HAT (MCU side)
# https://sequentmicrosystems.com
#
# Protocol: Sequent custom MCU with 1-byte register address prefix.
# I²C address = base + stack_id.
#
# This is the ANALOG SIDE of a dual-protocol board.
# The digital input side uses a PCA9535 at base 0x20 — see 8inputs_pca.toml.
#
# Register map derived from:
#   https://github.com/SequentMicrosystems/8inputs-rpi
#
# The MCU side may provide:
#   - Edge counting
#   - Encoder inputs
#   - Analog features (varies by board revision)
#
# NOTE: Register addresses are approximate — verify against source.
#
# ⚠️  EXPERIMENTAL — not validated on real hardware.

[board]
name = "Sequent 8-Input HAT (analog)"
protocol = "sequent_mcu"

[address]
base = 0x20
mode = "direct"

[channels]
# Channel counts need hardware verification

[registers]
# Register layout needs verification against 8inputs source
revision_major = 0x78
revision_minor = 0x79
voltage_scale = 1000.0

# Board Definition: Sequent Dashboard Controller HAT (DASH)
# https://sequentmicrosystems.com
#
# Protocol: Sequent custom MCU with 1-byte register address prefix.
# I²C address = base + stack_id.
#
# Register map ported from:
#   https://github.com/SequentMicrosystems/dash-rpi/blob/main/src/data.h
#
# I/O capabilities:
#   - 4 open-drain outputs (reg 0x00/0x01/0x02 — mapped as relays)
#   - 16 opto-isolated inputs (reg 0x03, 2B bitmask)
#   - 8 × 0-10V analog inputs (reg 0x05, 2B LE, mV)
#   - 4 OD PWM outputs (reg 0x19, 2B LE)
#   - 8 LEDs
#
# Additional features NOT mapped by the current RegisterMap schema:
#   - 2 resistive inputs (reg 0x15, 2B LE)
#   - Backlight PWM (reg 0x21)
#   - Opto edge counting (16ch × 4B at reg 0x2A)
#   - DIN power control (debounce, power-off delay)
#   - WDT, calibration
#
# ⚠️  EXPERIMENTAL — not validated on real hardware.

[board]
name = "Sequent Dashboard Controller HAT"
protocol = "sequent_mcu"

[address]
base = 0x35
mode = "direct"         # base + stack_id

[channels]
relays = 4              # Open-drain outputs, controlled like relays
opto_inputs = 16
analog_0_10v_inputs = 8
od_outputs = 4

[registers]
relay_val = 0x00        # OD output bitmask (4 ch, read)
relay_set = 0x01        # Write channel to SET
relay_clr = 0x02        # Write channel to CLEAR
opto_in = 0x03          # Opto input bitmask (16ch, 2B LE)
u0_10_in = 0x05         # 0-10V input base (8ch × 2B LE, mV)
# r_in = 0x15           # 2ch × 2B LE, resistive inputs
od_pwm = 0x19           # 4ch × 2B LE, OD PWM
# backlight_pwm = 0x21  # Backlight brightness (2B LE)
diag_5v = 0x23          # 3.3V rail voltage (2B LE, mV)
diag_temperature = 0x25 # CPU temperature (2B LE) — note: 2B on this board
# opto_count_enable = 0x27
# opto_cnt_rst = 0x29
# opto_edge_count = 0x2A  # 16ch × 4B counters
calib_value = 0x6A      # Calibration value (4B float)
# wdt_reset = 0x71
# vcc_mv = 0x85         # Main supply voltage (2B LE, mV)
revision_major = 0xFB   # Hardware revision major (251)
revision_minor = 0xFC   # Hardware revision minor
# Note: Firmware version at 0xFD/0xFE
voltage_scale = 1000.0

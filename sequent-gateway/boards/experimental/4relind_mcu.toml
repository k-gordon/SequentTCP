# Board Definition: Sequent 4-Relay Industrial HAT (MCU side)
# https://sequentmicrosystems.com
#
# Protocol: Sequent custom MCU with 1-byte register address prefix.
# I²C address = base + stack_id.
#
# This is the ANALOG/INPUT SIDE of a dual-protocol board.
# The relay side uses a PCA9535 at base 0x38 — see 4relind_pca.toml.
#
# Register map derived from:
#   https://github.com/SequentMicrosystems/4relind-rpi
#
# The MCU side provides:
#   - 4 × 0-10V analog inputs
#   - 4 × 4-20mA analog inputs
#   - 4 × 0-10V analog outputs
#   - 4 × 4-20mA analog outputs
#   - 4 opto inputs
#
# NOTE: Register addresses are approximate — verify against source.
#
# ⚠️  EXPERIMENTAL — not validated on real hardware.

[board]
name = "Sequent 4-Relay Industrial HAT (analog)"
protocol = "sequent_mcu"

[address]
base = 0x0E
mode = "direct"         # base + stack_id

[channels]
opto_inputs = 4
analog_4_20ma_inputs = 4
analog_0_10v_inputs = 4

[registers]
opto_in = 0x03          # Opto input bitmask (4 ch)
# Register layout follows megaioind pattern for analog I/O
# Exact addresses need hardware verification
diag_temperature = 0x72
diag_24v = 0x73
diag_5v = 0x75
revision_major = 0x78
revision_minor = 0x79
voltage_scale = 1000.0

# Board Definition: Sequent MegaInd Industrial HAT
# https://sequentmicrosystems.com/collections/industrial-automation
#
# Protocol: Sequent custom MCU with 1-byte register address prefix.
# I²C address = base + stack_id.
#
# Register map ported from:
#   https://github.com/SequentMicrosystems/megaind-rpi/blob/main/src/megaind.h
#
# Drop this file into the boards/ directory to override compiled defaults.
# Any field you omit will use the built-in default value.

[board]
name = "Sequent MegaInd Industrial HAT"
protocol = "sequent_mcu"

[address]
base = 0x50
mode = "direct"         # base + stack_id

[channels]
opto_inputs = 8
analog_4_20ma_inputs = 8
analog_0_10v_inputs = 4
od_outputs = 4
analog_0_10v_outputs = 4
analog_4_20ma_outputs = 4

[registers]
relay_val = 0x00        # Current relay/OD output bitmask (read)
relay_set = 0x01        # Write channel number to SET (turn ON)
relay_clr = 0x02        # Write channel number to CLEAR (turn OFF)
opto_in = 0x03          # Opto-isolated input bitmask (read)
u0_10_out = 0x04        # 0-10V analog output base (4ch × 2B LE, mV)
i4_20_out = 0x0C        # 4-20mA analog output base (4ch × 2B LE)
od_pwm = 0x14           # Open-drain PWM base (4ch × 2B LE, 0-10000)
u0_10_in = 0x1C         # 0-10V analog input base (4ch × 2B LE, mV)
u_pm_10_in = 0x24       # ±10V analog input base (4ch × 2B LE)
i4_20_in = 0x2C         # 4-20mA analog input base (8ch × 2B LE)
calib_value = 0x3C      # Calibration register
diag_temperature = 0x72 # CPU temperature (1B, °C)
diag_24v = 0x73         # 24V rail voltage (2B LE, mV)
diag_5v = 0x75          # 5V rail voltage (2B LE, mV)
revision_major = 0x78   # Firmware major version
revision_minor = 0x79   # Firmware minor version
voltage_scale = 1000.0  # Raw register value ÷ scale = physical value

# ─── I/O Group Descriptors ────────────────────────────────────────────
# These drive the generic HAL driver.  Each group describes an I²C
# operation and its mapping into the Modbus data bank.

[[io_group]]
name = "4-20mA inputs"
direction = "input"
op = "read_u16_le"
register = 0x2C
channels = 8
i2c_scale = 1000.0
modbus_scale = 100.0
modbus_region = "holding_register"
modbus_offset = 0

[[io_group]]
name = "PSU voltage"
direction = "input"
op = "read_u16_le"
register = 0x73
channels = 1
i2c_scale = 1000.0
modbus_scale = 100.0
modbus_region = "holding_register"
modbus_offset = 8

[[io_group]]
name = "0-10V inputs"
direction = "input"
op = "read_u16_le"
register = 0x1C
channels = 4
i2c_scale = 1000.0
modbus_scale = 100.0
modbus_region = "holding_register"
modbus_offset = 10

[[io_group]]
name = "Opto inputs"
direction = "input"
op = "read_u8_bitmask"
register = 0x03
channels = 8
modbus_region = "discrete_input"
modbus_offset = 0

[[io_group]]
name = "OD outputs"
direction = "output"
op = "write_set_clr"
register_set = 0x01
register_clr = 0x02
channels = 4
modbus_region = "coil"
modbus_offset = 16

[[io_group]]
name = "0-10V outputs"
direction = "output"
op = "write_u16_le"
register = 0x04
channels = 4
i2c_scale = 1000.0
modbus_scale = 100.0
modbus_region = "holding_register"
modbus_offset = 16

[[io_group]]
name = "4-20mA outputs"
direction = "output"
op = "write_u16_le"
register = 0x0C
channels = 4
i2c_scale = 1000.0
modbus_scale = 100.0
modbus_region = "holding_register"
modbus_offset = 20

# Test Scenario: 16-Relay Only
#
# Relay HAT only — no MegaInd.  Verifies the gateway operates with
# relay boards even when analog I/O channels are absent.
#
# Board definitions are loaded from the TOML files in boards/.

[scenario]
name = "16-Relay Only"
description = "16-Relay HAT only, no MegaInd"

[gateway]
boards = ["relay16"]
single_slave = false
relay_slave_id = 1
ind_slave_id = 2          # not used (no megaind)
ind_stack = 1
relay_stack = 0
health_port = 8080
boards_dir = "boards"
extra_args = []

[expect]
relay_count = 16
opto_channels = 0
ma_in_channels = 0
v_in_channels = 0
od_channels = 0
v_out_channels = 0
ma_out_channels = 0
relay_readback = true

[tests]
health = true
analog_inputs = false
relay_writes = true
od_outputs = false
analog_outputs = false
stability = true

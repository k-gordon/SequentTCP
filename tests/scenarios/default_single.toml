# Test Scenario: Default Single-Slave
#
# Same hardware as default_multi but in backward-compatible single-slave
# mode — all registers on one flat Unit ID.

[scenario]
name = "Default Single-Slave"
description = "MegaInd + 16-Relay, single-slave (flat) addressing"

[gateway]
boards = ["megaind", "relay16"]
single_slave = true
relay_slave_id = 1
ind_slave_id = 1          # ignored in single-slave mode
ind_stack = 1
relay_stack = 0
health_port = 8080
builtin_defaults = true
extra_args = []

[expect]
relay_count = 16
opto_channels = 8
ma_in_channels = 8
v_in_channels = 4
od_channels = 4
v_out_channels = 4
ma_out_channels = 4
relay_readback = true

[tests]
health = true
analog_inputs = true
relay_writes = true
od_outputs = true
analog_outputs = true
stability = true

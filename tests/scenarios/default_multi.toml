# Test Scenario: Default Multi-Slave
#
# Standard production setup — MegaInd + 16-Relay, each on its own
# Modbus slave ID.  This is the configuration validated at 37/37 in
# the original hw-validation.py suite.
#
# Board definitions are loaded from the TOML files in boards/.

[scenario]
name = "Default Multi-Slave"
description = "MegaInd + 16-Relay, multi-slave addressing"

[gateway]
boards = ["megaind", "relay16"]
single_slave = false
relay_slave_id = 1
ind_slave_id = 2
ind_stack = 1
relay_stack = 0
health_port = 8080
boards_dir = "boards"
extra_args = []

[expect]
relay_count = 16
opto_channels = 8
ma_in_channels = 8
v_in_channels = 4
od_channels = 4
v_out_channels = 4
ma_out_channels = 4
relay_readback = true

[tests]
health = true
analog_inputs = true
relay_writes = true
od_outputs = true
analog_outputs = true
stability = true
